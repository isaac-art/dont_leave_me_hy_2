name: HysteriaManagerMobile

options:
  bundleIdPrefix: com.isaacclarke
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Set your paid-account team here (or in Xcode → Signing & Capabilities):
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad

targets:
  # ───────────────────────── Container app ─────────────────────────
  HysteriaManagerMobile:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: ../Shared
    dependencies:
      - target: HysteriaTunnel        # embeds the .appex automatically
      - target: HysteriaWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacclarke.HysteriaManagerMobile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan QR codes to import hysteria connections."
        INFOPLIST_KEY_CFBundleDisplayName: "Hysteria"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: App/HysteriaManagerMobile.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.isaacclarke.HysteriaManager

  # ─────────────────────── Packet-tunnel extension ───────────────────────
  HysteriaTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: Tunnel
      - path: ../Shared/AppGroup.swift
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacclarke.HysteriaManagerMobile.tunnel
        # Network Extensions run with a tight memory budget; keep optimization on.
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        # gomobile-built Libbox references UIApplication; link UIKit so it resolves.
        OTHER_LDFLAGS: ["$(inherited)", "-framework", "UIKit"]
    info:
      path: Tunnel/Info.plist
      properties:
        CFBundleDisplayName: "HysteriaTunnel"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: Tunnel/HysteriaTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.isaacclarke.HysteriaManager

  # ─────────────────────── Widget (homescreen) ───────────────────────
  HysteriaWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes: ["Info.plist", "HysteriaWidget.entitlements"]
      - path: ../Shared/AppGroup.swift
      - path: ../Shared/SharedState.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacclarke.HysteriaManagerMobile.widget
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: "Hysteria"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/HysteriaWidget.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.isaacclarke.HysteriaManager
